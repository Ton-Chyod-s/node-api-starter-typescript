post:
  tags: [Auth Web]
  summary: Logout
  operationId: logout
  parameters:
    - $ref: ../components/parameters.yaml#/CsrfHeader
  description: >
    Requer autenticação via cookie ou Bearer.
    Limpa o cookie `token` (se existir).
    Observação: quando CSRF_ENABLED=true, o CSRF só é exigido se o cookie de autenticação `token`
    estiver presente na requisição. Requests autenticados via Bearer não são afetados.
  security:
    # Cookie: precisa do cookie token (e, quando CSRF_ENABLED=true, do header x-csrf-token)
    - cookieAuth: []

    # Bearer: para clients/CLI (sem CSRF)
    - bearerAuth: []
  responses:
    '200':
      description: OK
      headers:
        Set-Cookie:
          schema:
            type: string
          description: Cookie expirado para limpar token (quando aplicável)
      content:
        application/json:
          schema:
            $ref: ../openapi.yaml#/components/schemas/ApiResponse
          examples:
            ok:
              value:
                statusCode: 200
                message: 'Logout successful'
    '401':
      $ref: ../openapi.yaml#/components/responses/Unauthorized
    '403':
      $ref: ../openapi.yaml#/components/responses/ForbiddenCsrf
    '500':
      $ref: ../openapi.yaml#/components/responses/InternalServerError
